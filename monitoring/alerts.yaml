groups:
  - name: kk-payments-alerts
    rules:

      - alert: KKPaymentsDown
        expr: up{job="kk-payments"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "kk-payments service is down"
          description: "Prometheus cannot reach kk-payments for more than 1 minute."

      - alert: HighPodRestarts
        expr: increase(kube_pod_container_status_restarts_total[5m]) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High pod restart count detected"
          description: "kk-payments pods are restarting frequently."