global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: kk-payments
    static_configs:
      - targets:
          - kk-payments.kijani-staging.svc.cluster.local:3000
          - kk-payments.kijani-project.svc.cluster.local:3000
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: kk-payments
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod